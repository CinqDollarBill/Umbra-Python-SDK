# Publish umbra-sdk to PyPI on a version tag (public repo).
#
# Uses PyPI Trusted Publishing (OIDC) — no API token needed. One-time PyPI setup:
#   PyPI -> project "umbra-sdk" -> Publishing -> add a trusted publisher:
#     Owner: CinqDollarBill   Repository: Umbra-Python-SDK
#     Workflow: publish.yml    Environment: pypi
# Tag a release in the public repo (e.g. `git tag v0.1.0 && git push --tags`) to trigger.
name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
