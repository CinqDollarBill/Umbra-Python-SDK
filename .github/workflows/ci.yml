# CI for the public umbra-sdk repo (mirrored from the monorepo's sdk/python).
# Runs the test suite across supported Python versions plus lint/format checks.
name: CI

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  lint:
    # Advisory until a one-time `black . && ruff check --fix` baseline is committed;
    # then drop the `continue-on-error` lines to make formatting/lint a hard gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff black
      - name: Lint (ruff)
        continue-on-error: true
        run: ruff check umbra tests examples
      - name: Format check (black)
        continue-on-error: true
        run: black --check umbra tests examples
